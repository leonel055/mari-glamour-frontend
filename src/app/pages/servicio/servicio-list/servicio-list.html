<div class="page-container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="page-title mb-0">Servicios</h2>
    <a routerLink="/admin/servicios/nuevo" class="btn btn-primary btn-sm">
      <i class="bi bi-plus-lg"></i> Nuevo
    </a>
  </div>

  @if (servicios.length === 0) {
    <div class="empty-state">
      <i class="bi bi-brush"></i>
      <p>Sin servicios registrados</p>
    </div>
  } @else {
    <div class="servicios-grid">
      @for (servicio of servicios; track servicio.id) {
        <div class="servicio-card-wrapper">
          <a [routerLink]="['/servicios/editar', servicio.id]" class="servicio-card">
            <div class="servicio-precio">{{ formatearPrecio(servicio.precio) }}</div>
            <div class="servicio-nombre">{{ servicio.nombre }}</div>
            <div class="servicio-duracion">
              <i class="bi bi-clock"></i> {{ servicio.duracion }} min
            </div>
            <i class="bi bi-chevron-right servicio-arrow"></i>
          </a>
          <button class="delete-btn" (click)="eliminarServicio(servicio, $event)" title="Eliminar servicio">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      }
    </div>
  }
</div>
