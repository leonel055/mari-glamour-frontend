<div class="page-container">
  <h2 class="page-title">{{ esEdicion ? 'Editar Servicio' : 'Nuevo Servicio' }}</h2>

  <div class="form-card">
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-tag"></i> Nombre *
        </label>
        <input type="text" class="form-control" [(ngModel)]="servicio.nombre" name="nombre" placeholder="Nombre del servicio" />
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-cash"></i> Precio *
        </label>
        <input type="number" class="form-control" [(ngModel)]="servicio.precio" name="precio" placeholder="0" />
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-clock"></i> Duracion (minutos) *
        </label>
        <input type="number" class="form-control" [(ngModel)]="servicio.duracion" name="duracion" placeholder="90" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary form-btn">
          <i class="bi bi-check-lg"></i> {{ esEdicion ? 'Guardar Cambios' : 'Crear Servicio' }}
        </button>
        <button type="button" class="btn btn-outline-secondary form-btn" (click)="router.navigate(['/admin/servicios'])">Cancelar</button>
      </div>
    </form>
  </div>
</div>
