<div class="page-container">
  <h2 class="page-title">{{ esEdicion ? 'Editar Producto' : 'Nuevo Producto' }}</h2>

  <div class="form-card">
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-tag"></i> Nombre *
        </label>
        <input type="text" class="form-control" [(ngModel)]="producto.nombre" name="nombre" placeholder="Nombre del producto" />
      </div>

      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-card-text"></i> Descripcion
        </label>
        <textarea class="form-control" [(ngModel)]="producto.descripcion" name="descripcion" rows="3" placeholder="Descripcion del producto..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group form-group-half">
          <label class="form-label">
            <i class="bi bi-cash"></i> Precio *
          </label>
          <input type="number" class="form-control" [(ngModel)]="producto.precio" name="precio" placeholder="0" />
        </div>
        <div class="form-group form-group-half">
          <label class="form-label">
            <i class="bi bi-bookmark"></i> Categoria
          </label>
          <input type="text" class="form-control" [(ngModel)]="producto.categoria" name="categoria" placeholder="Ej: Uñas, Cuidado" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group form-group-half">
          <label class="form-label">
            <i class="bi bi-building"></i> Marca
          </label>
          <input type="text" class="form-control" [(ngModel)]="producto.marca" name="marca" placeholder="Marca del producto" />
        </div>
        <div class="form-group form-group-half">
          <label class="form-label">
            <i class="bi bi-box"></i> Stock
          </label>
          <input type="number" class="form-control" [(ngModel)]="producto.stock" name="stock" placeholder="0" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">
          <i class="bi bi-image"></i> Imagen del producto
        </label>

        @if (!previewUrl) {
          <label class="upload-zone">
            <input type="file" accept="image/jpeg,image/png,image/webp" (change)="onFileSelected($event)" hidden />
            <i class="bi bi-cloud-arrow-up"></i>
            <span>Toca para seleccionar imagen</span>
            <small>JPG, PNG o WebP (max 5MB)</small>
          </label>
        } @else {
          <div class="upload-preview">
            <img [src]="previewUrl" alt="Preview" />
            <button type="button" class="upload-remove" (click)="clearImage()">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        }
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary form-btn" [disabled]="subiendo">
          @if (subiendo) {
            <span class="spinner-sm"></span> Subiendo...
          } @else {
            <i class="bi bi-check-lg"></i> {{ esEdicion ? 'Guardar Cambios' : 'Crear Producto' }}
          }
        </button>
        <button type="button" class="btn btn-outline-secondary form-btn" (click)="router.navigate(['/admin/productos'])" [disabled]="subiendo">Cancelar</button>
      </div>
    </form>
  </div>
</div>
